    </div>

<main>
  <div class="admin-container">
    <h1 style="margin-bottom: 30px; color: var(--accent);">Προφίλ</h1>
    <div id="status" class="admin-status" role="status" aria-live="polite"></div>

    <div class="profile-grid">
      <div class="admin-section">
        <h2>Λογαριασμός</h2>
        <form id="profileForm">
          <div class="profile-avatar">
            <img id="avatarPreview" src="/assets/default-avatar.svg" alt="Προφίλ avatar" />
            <div class="avatar-upload">
              <input type="file" id="avatar" accept="image/*" />
              <input type="hidden" id="avatarUrl" />
            </div>
          </div>

          <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" readonly disabled />
          </div>

          <div class="name-row">
            <div class="form-group">
              <label>Όνομα</label>
              <input id="firstName" type="text" placeholder="Όνομα" autocomplete="given-name" />
            </div>

            <div class="form-group">
              <label>Επώνυμο</label>
              <input id="lastName" type="text" placeholder="Επώνυμο" autocomplete="family-name" />
            </div>
          </div>

          <div class="form-group">
            <label>Σχετικά με εμένα</label>
            <textarea id="bio" rows="4" maxlength="500" placeholder="Λίγα λόγια για εσένα…" style="width:100%;resize:vertical;"></textarea>
            <small class="muted" style="display:block;text-align:right;"><span id="bioCharCount">0</span>/500</small>
          </div>

          <div class="button-group">
            <button type="submit">Αποθήκευση Προφίλ</button>
            <button type="button" id="logoutBtn" class="secondary">Αποσύνδεση</button>
          </div>
        </form>
      </div>

      <div class="admin-section">
        <h2>Αλλαγή Κωδικού</h2>
        <form id="passwordForm">
          <div class="form-group">
            <label>Τρέχων Κωδικός</label>
            <input id="currentPassword" type="password" autocomplete="current-password" required />
          </div>
          <div class="form-group">
            <label>Νέος Κωδικός</label>
            <input id="newPassword" type="password" autocomplete="new-password" required />
          </div>
          <div class="form-group">
            <label>Επιβεβαίωση Νέου Κωδικού</label>
            <input id="confirmPassword" type="password" autocomplete="new-password" required />
          </div>
          <button type="submit">Ενημέρωση Κωδικού</button>
        </form>
      </div>
    </div>

  </div>
</main>

    <span class="newsletter-title">📬 Newsletter</span>
    <form class="newsletter-form" id="newsletter-form">
      <input type="email" name="email" placeholder="Το email σας..." required autocomplete="email" />
      <button type="submit">Εγγραφή</button>

    <a class="newsletter-website-link" href="https://www.ekdoseis-tsotras.gr/" target="_blank" rel="noopener noreferrer">Επισκεφθείτε την ιστοσελίδα μας <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 14.78a.75.75 0 0 0 1.06 0l7.22-7.22v5.69a.75.75 0 0 0 1.5 0v-7.5a.75.75 0 0 0-.75-.75h-7.5a.75.75 0 0 0 0 1.5h5.69l-7.22 7.22a.75.75 0 0 0 0 1.06z" clip-rule="evenodd"/></svg></a>
